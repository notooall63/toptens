<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Tens | Your Personal Ranking Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <div class="header-left">
            <button id="back-button" class="btn-back hidden">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                BACK
            </button>
        </div>
        <div class="header-center">
            <h1 class="app-title">Top Tens</h1>
        </div>
        <div class="header-right"></div>
    </header>

    <main class="app-container">

        <div id="landing-view" class="view-panel center-panel">
            <img src="AppIconTopTens.jpg" alt="Top Tens Logo" class="landing-logo">
            <p class="app-description">Your personal dynamic list hub. Rank and sort your favorite things values securely across device sandboxes. Create as many categories as you like up to your strict limit.</p>
            <button id="enter-vault-btn" class="btn-primary" style="margin-top: 30px;">Enter Vault</button>
        </div>

        <div id="categories-view" class="view-panel hidden">
            <div class="control-bar">
                <button id="add-category-btn" class="btn-primary">Add Custom Categories—Up To 21 Total</button>
            </div>
            <div id="categories-grid" class="grid-layout">
                </div>
        </div>

        <div id="list-view" class="view-panel hidden">
            <h2 id="current-category-title" style="color: #bf953f; margin-bottom: 20px; font-weight: 700; text-align: center;">Category</h2>
            
            <div class="input-group">
                <input type="text" id="new-item-input" placeholder="Type a new item entry..." autocomplete="off">
                <button id="add-item-btn" class="btn-accent">Add Item</button>
            </div>

            <ol id="ranked-items-list" class="ranked-list">
                </ol>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
