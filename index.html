<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Tens | Your Personal Ranking Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Playfair+Display:ital,wght@0,600;1,400&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2.4">
</head>
<body>

    <header class="app-header">
        <div class="header-left">
            <img id="header-logo" src="AppIconTopTens.jpg" alt="Top Tens Icon" class="header-icon hidden">
            <button id="back-button" class="btn-back hidden">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                BACK
            </button>
        </div>
        <div class="header-center">
            <h1 id="header-title" class="app-title hidden">Top Tens</h1>
        </div>
        <div class="header-right">
            <button id="settings-button" class="btn-settings hidden">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </div>
    </header>

    <main class="app-container">

        <div id="landing-view" class="view-panel landing-panel">
            <h1 class="landing-title">Top Tens</h1>
            <p class="app-description">Your personal dynamic Favorite-Things vault. Rank, sort, and track your favorite things in real time. Compare your tastes with your friends, or fuse your similar lists with theirs to discover what truly reigns supreme.</p>
            <button id="enter-vault-btn" class="btn-gold-dynamic">Enter Vault</button>
        </div>

        <div id="categories-view" class="view-panel hidden">
            <div class="control-bar">
                <button id="add-category-btn" class="btn-gold-dynamic">Add Custom Categories—Up To 21 Total</button>
            </div>
            <div id="categories-grid" class="grid-layout">
                </div>
        </div>

        <div id="list-view" class="view-panel hidden">
            <h2 id="current-category-title" class="category-view-title">Category</h2>
            
            <div class="input-matrix-group">
                <input type="text" id="new-item-input" placeholder="Type item title..." autocomplete="off">
                <input type="number" id="new-item-rank" placeholder="Rank (e.g. 1)" min="1">
                <input type="url" id="new-item-url" placeholder="Reference URL Link (https://...)" autocomplete="off">
                
                <div class="media-upload-wrapper">
                    <label for="new-item-media" class="media-label" id="media-status-label">Select Thumbnail (Img / Video ≤ 6s)</label>
                    <input type="file" id="new-item-media" accept="image/*,video/*">
                </div>

                <div id="alignment-control-sandbox" class="alignment-sandbox hidden">
                    <p class="sandbox-instruction-text">Drag slider to center preview frame:</p>
                    <div class="cropper-frame-container">
                        <canvas id="crop-canvas" width="120" height="120"></canvas>
                    </div>
                    <input type="range" id="center-offset-slider" min="-100" max="100" value="0">
                </div>

                <button id="add-item-btn" class="btn-accent">Add Item</button>
            </div>

            <ol id="ranked-items-list" class="ranked-list">
                </ol>
        </div>

    </main>

    <script src="app.js?v=2.4"></script>
</body>
</html>
