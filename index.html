<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Tens</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Navigation Header -->
        <header class="vault-header">
            <button id="back-btn" class="hidden">←</button>
            <h1 id="view-title">THE VAULT</h1>
            <button id="menu-btn">☰</button>
        </header>

        <!-- Main Content Views -->
        <main id="view-container">
            <!-- Auth View -->
            <section id="auth-view" class="view">
                <div class="auth-box">
                    <h2>ACCESS GATE</h2>
                    <input type="email" id="auth-email" placeholder="ENTER EMAIL">
                    <input type="password" id="auth-password" placeholder="ENTER PIN">
                    <button id="login-btn" class="btn-primary">VERIFY</button>
                    <button id="signup-btn" class="btn-secondary">INITIALIZE NEW ACCOUNT</button>
                    <p id="auth-msg" class="feedback-msg"></p>
                </div>
            </section>

            <!-- Categories View -->
            <section id="categories-view" class="view hidden">
                <div class="list-container" id="categories-list"></div>
            </section>

            <!-- Rankings/Items View -->
            <section id="items-view" class="view hidden">
                <div class="list-container" id="items-list"></div>
                <div class="center-container">
                    <button id="add-item-btn" class="btn-add">ADD ITEM</button>
                </div>
            </section>

            <!-- Friends View -->
            <section id="friends-view" class="view hidden">
                <h2>CONNECTED KEYS</h2>
                <div class="list-container" id="friends-list"></div>
                <div class="center-container">
                    <input type="text" id="friend-id-input" placeholder="ENTER FRIEND ID">
                    <button id="add-friend-btn" class="btn-add">ADD FRIEND</button>
                </div>
            </section>
        </main>

        <!-- Settings Drawer Overlay -->
        <div id="settings-drawer" class="drawer hidden">
            <div class="drawer-content">
                <button id="close-drawer-btn" class="btn-close">×</button>
                <h3>SYSTEM SETTINGS</h3>
                <hr class="drawer-divider">
                
                <!-- Profile Avatar Section -->
                <div class="avatar-section">
                    <div id="avatar-preview" class="avatar-placeholder"></div>
                    <input type="file" id="avatar-upload" accept="image/*" class="hidden">
                    <button id="change-avatar-btn" class="btn-secondary">UPLOAD AVATAR</button>
                </div>

                <!-- Complete Control Matrix -->
                <nav class="drawer-nav">
                    <button id="nav-categories-btn" class="btn-drawer">📁 CATEGORIES</button>
                    <button id="nav-friends-btn" class="btn-drawer">👥 FRIENDS LIST</button>
                    <button id="nav-account-btn" class="btn-drawer">🔐 ACCOUNT SECURITY</button>
                    <button id="nav-theme-btn" class="btn-drawer">🎨 THEME ENGINE</button>
                    <button id="logout-btn" class="btn-danger">🔒 DISCONNECT SESSION</button>
                </nav>
            </div>
        </div>
    </div>
    <script src="stockitems.js"></script>
    <script src="app.js"></script>
</body>
</html>
