<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Tens</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="landing-page" class="view-layer active">
        <div class="landing-hero">
            <h1>Top Tens</h1>
            <p>Your curated world in ranked orders.</p>
            <div class="landing-actions">
                <button id="btn-enter" class="btn-primary">Enter App</button>
                <button id="btn-landing-signin" class="btn-secondary">Sign In</button>
            </div>
        </div>
    </div>

    <div id="app-interface" class="view-layer">
        <header class="app-header">
            <div class="header-left">
                <button id="btn-back" class="icon-btn hidden">←</button>
                <span id="app-title" class="brand-title">Top Tens</span>
            </div>
            <div class="header-right">
                <button id="btn-avatar" class="avatar-icon-btn" aria-label="Profile View">
                    <div id="avatar-display" class="avatar-placeholder">U</div>
                </button>
                <button id="btn-burger" class="burger-menu-btn" aria-label="Settings Configuration">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </header>

        <main class="app-container">
            <section id="categories-view" class="sub-view active">
                <div id="categories-grid" class="category-grid"></div>
            </section>

            <section id="list-view" class="sub-view">
                <h2 id="current-list-title">Category Items</h2>
                <div id="items-list" class="items-list-container"></div>
            </section>
        </main>
    </div>

    <div id="drawer-overlay" class="drawer-overlay"></div>

    <div id="drawer-signin" class="app-drawer" data-position="right">
        <div class="drawer-header">
            <h3>Account Access</h3>
            <button class="close-drawer-btn" aria-label="Close Drawer">&times;</button>
        </div>
        <div class="drawer-content">
            <form id="auth-form" class="auth-form">
                <div class="form-group">
                    <label for="auth-username">Username</label>
                    <input type="text" id="auth-username" required placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label for="auth-password">Password</label>
                    <input type="password" id="auth-password" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn-primary full-width">Sign In / Register</button>
            </form>
            <div id="auth-message" class="auth-feedback"></div>
        </div>
    </div>

    <div id="drawer-settings" class="app-drawer" data-position="right">
        <div class="drawer-header">
            <h3>Configuration</h3>
            <button class="close-drawer-btn" aria-label="Close Drawer">&times;</button>
        </div>
        <div class="drawer-content">
            <ul class="settings-list">
                <li class="settings-item">
                    <span>Dark Theme</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="toggle-dark-mode">
                        <span class="slider"></span>
                    </label>
                </li>
                <li class="settings-item">
                    <span>Compact Interface</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="toggle-compact">
                        <span class="slider"></span>
                    </label>
                </li>
                <li class="settings-item separator"></li>
                <li class="settings-item action-row">
                    <button id="btn-settings-signin" class="btn-secondary full-width">Sign In to Sync Data</button>
                </li>
            </ul>
        </div>
    </div>

    <div id="drawer-profile" class="app-drawer" data-position="right">
        <div class="drawer-header">
            <h3>User Profile</h3>
            <button class="close-drawer-btn" aria-label="Close Drawer">&times;</button>
        </div>
        <div class="drawer-content">
            <div class="profile-card">
                <div id="profile-avatar-large" class="profile-avatar-large">U</div>
                <h4 id="profile-username">Guest User</h4>
                <p id="profile-status">Local Session</p>
            </div>
            <ul class="profile-actions">
                <li><button id="btn-profile-sync" class="btn-text">Sync Cloud Configurations</button></li>
                <li><button id="btn-logout" class="btn-danger-text hidden">Sign Out of Session</button></li>
            </ul>
        </div>
    </div>

    <script src="stockitems.js"></script>
    <script src="app.js"></script>
</body>
</html>
