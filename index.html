<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Tens</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --gold-primary: #d4af37;
            --gold-secondary: #aa8413;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-container {
            width: 100%;
            max-width: 412px;
            height: 915px;
            background-color: var(--bg-color);
            border: 8px solid #2c2c2c;
            border-radius: 40px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* --- Global Header Configuration --- */
        .app-header {
            height: 70px;
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            display: grid;
            grid-template-columns: 60px 1fr 60px;
            align-items: center;
            padding: 0 10px;
            position: relative;
            z-index: 10;
        }

        .header-left, .header-right {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .header-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Header Logo Styled in Gold */
        .header-logo {
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--gold-primary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--gold-primary);
            font-size: 1.5rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .icon-btn:hover {
            background: rgba(212, 175, 55, 0.1);
        }

        /* Clickable Header Avatar */
        .header-avatar-btn {
            background: none;
            border: 2px solid var(--gold-primary);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-avatar-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- App Content Wrapper --- */
        .app-content {
            flex: 1;
            overflow-y: auto;
            position: relative;
        }

        .page {
            display: none;
            padding: 20px;
            height: 100%;
        }

        .page.active {
            display: block;
        }

        /* --- Category List Layout --- */
        .category-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .category-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .category-card:hover {
            transform: translateY(-2px);
            border-color: var(--gold-primary);
        }

        .category-title {
            color: var(--gold-primary);
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .category-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* --- Detail View Layout --- */
        .detail-header {
            margin-bottom: 20px;
        }

        .detail-title {
            color: var(--gold-primary);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .tens-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .rank-item {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .rank-number {
            color: var(--gold-primary);
            font-size: 1.3rem;
            font-weight: 800;
            width: 30px;
        }

        .rank-text {
            font-size: 1rem;
            font-weight: 500;
        }

        /* --- Side Drawer Overlay and Panels --- */
        .drawer-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 99;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .drawer-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .drawer {
            position: absolute;
            top: 0;
            height: 100%;
            width: 300px;
            background-color: var(--surface-color);
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            z-index: 100;
            transition: transform 0.3s ease;
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        /* Right-side Drawer (Settings) */
        .drawer-right {
            right: 0;
            transform: translateX(100%);
            border-left: 1px solid var(--border-color);
        }

        /* Left-side Drawer (Profile Info) */
        .drawer-left {
            left: 0;
            transform: translateX(-100%);
            border-right: 1px solid var(--border-color);
        }

        .drawer.active {
            transform: translateX(0);
        }

        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .drawer-title {
            color: var(--gold-primary);
            font-size: 1.3rem;
            font-weight: 600;
        }

        /* --- Editable Profile Forms --- */
        .profile-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--gold-primary);
        }

        .save-btn {
            background-color: var(--gold-primary);
            color: var(--bg-color);
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.2s;
        }

        .save-btn:hover {
            background-color: var(--gold-secondary);
        }

        .settings-menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .settings-item {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            color: var(--text-color);
        }

        .settings-item:hover {
            color: var(--gold-primary);
        }
    </style>
</head>
<body>

    <div class="phone-container">
        
        <header class="app-header">
            <div class="header-left">
                <button class="icon-btn" id="backBtn" style="visibility: hidden;" onclick="navigateTo('listPage')">&#x2190;</button>
            </div>
            <div class="header-center">
                <div class="header-logo">Top Tens</div>
            </div>
            <div class="header-right">
                <button class="icon-btn" onclick="toggleDrawer('settingsDrawer', true)">&#x2630;</button>
            </div>
        </header>

        <main class="app-content">
            
            <section id="listPage" class="page active">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="font-size: 1.4rem;">Categories</h2>
                    <button class="header-avatar-btn" onclick="toggleDrawer('profileDrawer', true)">
                        <img src="https://via.placeholder.com/150" alt="User Profile">
                    </button>
                </div>
                
                <div class="category-list">
                    <div class="category-card" onclick="openCategory('Movies')">
                        <div class="category-title">All-Time Sci-Fi Movies</div>
                        <div class="category-desc">The absolute pinnacle of speculative cinema.</div>
                    </div>
                    <div class="category-card" onclick="openCategory('Video Games')">
                        <div class="category-title">Retro Video Games</div>
                        <div class="category-desc">8-bit and 16-bit classics that shaped history.</div>
                    </div>
                </div>
            </section>

            <section id="detailPage" class="page">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <div class="detail-header">
                        <h2 class="detail-title" id="currentCategoryTitle">Category Title</h2>
                    </div>
                    <button class="header-avatar-btn" onclick="toggleDrawer('profileDrawer', true)">
                        <img src="https://via.placeholder.com/150" alt="User Profile">
                    </button>
                </div>

                <div class="tens-list" id="tensListContainer">
                    </div>
            </section>

        </main>

        <div class="drawer-overlay" id="drawerOverlay" onclick="closeAllDrawers()"></div>

        <div class="drawer drawer-left" id="profileDrawer">
            <div class="drawer-header">
                <div class="drawer-title">Profile Data</div>
                <button class="icon-btn" onclick="toggleDrawer('profileDrawer', false)">&times;</button>
            </div>
            <form class="profile-form" onsubmit="saveProfile(event)">
                <div class="form-group">
                    <label for="profName">Full Name</label>
                    <input type="text" id="profName" value="Sean D Woodson">
                </div>
                <div class="form-group">
                    <label for="profDob">Date of Birth</label>
                    <input type="date" id="profDob" value="1985-01-01">
                </div>
                <div class="form-group">
                    <label for="profEmail">Email Address</label>
                    <input type="email" id="profEmail" value="sean@example.com">
                </div>
                <div class="form-group">
                    <label for="profRecovery">Recovery Email/Phone</label>
                    <input type="text" id="profRecovery" value="recovery@example.com">
                </div>
                <button type="submit" class="save-btn">Save Info</button>
            </form>
        </div>

        <div class="drawer drawer-right" id="settingsDrawer">
            <div class="drawer-header">
                <div class="drawer-title">Settings</div>
                <button class="icon-btn" onclick="toggleDrawer('settingsDrawer', false)">&times;</button>
            </div>
            <div class="settings-menu">
                <div class="settings-item">App Preferences</div>
                <div class="settings-item">Security Options</div>
                <div class="settings-item">Notification Toggles</div>
                <div class="settings-item">Sign Out</div>
            </div>
        </div>

    </div>

    <script>
        const mockData = {
            'Movies': [
                "Blade Runner 2049", "The Matrix", "Interstellar", "2001: A Space Odyssey", 
                "Aliens", "Star Wars: The Empire Strikes Back", "Terminator 2", 
                "Arrival", "Inception", "Children of Men"
            ],
            'Video Games': [
                "Chrono Trigger", "Super Mario Bros. 3", "The Legend of Zelda: A Link to the Past",
                "Super Metroid", "Castlevania: Symphony of the Night", "Street Fighter II",
                "Sonic the Hedgehog 2", "Final Fantasy VI", "Mega Man X", "EarthBound"
            ]
        };

        function navigateTo(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            // Show/Hide back button dynamically based on page context
            const backBtn = document.getElementById('backBtn');
            if (pageId === 'detailPage') {
                backBtn.style.visibility = 'visible';
            } else {
                backBtn.style.visibility = 'hidden';
            }
        }

        function openCategory(categoryName) {
            document.getElementById('currentCategoryTitle').innerText = categoryName;
            const container = document.getElementById('tensListContainer');
            container.innerHTML = '';

            if (mockData[categoryName]) {
                mockData[categoryName].forEach((item, index) => {
                    const div = document.createElement('div');
                    div.className = 'rank-item';
                    div.innerHTML = `
                        <div class="rank-number">#${index + 1}</div>
                        <div class="rank-text">${item}</div>
                    `;
                    container.appendChild(div);
                });
            }
            navigateTo('detailPage');
        }

        function toggleDrawer(drawerId, open) {
            const overlay = document.getElementById('drawerOverlay');
            const drawer = document.getElementById(drawerId);

            if (open) {
                overlay.classList.add('active');
                drawer.classList.add('active');
            } else {
                drawer.classList.remove('active');
                if (!document.querySelector('.drawer.active')) {
                    overlay.classList.remove('active');
                }
            }
        }

        function closeAllDrawers() {
            document.getElementById('drawerOverlay').classList.remove('active');
            document.querySelectorAll('.drawer').forEach(drawer => drawer.classList.remove('active'));
        }

        function saveProfile(event) {
            event.preventDefault();
            // Implement local state updates here
            alert('Profile configuration updated successfully.');
            closeAllDrawers();
        }
    </script>
</body>
</html>
